        tailwind.config = {

                        'sans': ['"Inter"', 'sans-serif'],
                        'mono': ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        'bg-main': '#050505',
                        'bg-sub': '#0a0a0a',
                        'border-sub': 'rgba(255, 255, 255, 0.08)',
                        'accent': '#ffffff',
                        'text-main': '#ededed',
                        'text-muted': '#a1a1aa',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    }
                }
            }
        }

        // Global Mouse Position for Spotlight Effects
        document.addEventListener('mousemove', e => {
            const x = e.clientX;
            const y = e.clientY;

            // Update CSS variables for all cards
            document.querySelectorAll('.post-card, .nav-item').forEach(card => {
                const rect = card.getBoundingClientRect();
                const localX = x - rect.left;
                const localY = y - rect.top;
                card.style.setProperty('--mouse-x', `${localX}px`);
                card.style.setProperty('--mouse-y', `${localY}px`);
            });
        });
    </script>

        code[class*="language-"],

            text-shadow: none;
            font-size: 0.85em;

        @media (min-width: 1024px) {
